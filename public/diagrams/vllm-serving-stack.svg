<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="28" fill="#F6F1E7"/>
  <rect x="48" y="48" width="1104" height="664" rx="24" fill="#FFFaf2" stroke="#D9CDBA" stroke-width="2"/>

  <text x="78" y="105" fill="#2D241B" font-family="Georgia, serif" font-size="36" font-weight="700">Where vLLM Sits in a Production Stack</text>
  <text x="78" y="142" fill="#6B5B4B" font-family="Arial, sans-serif" font-size="20">vLLM 更像高性能执行层；平台治理能力通常仍在它上面。</text>

  <rect x="106" y="196" width="988" height="92" rx="18" fill="#EFE3D1" stroke="#D8CAB3" stroke-width="2"/>
  <text x="138" y="236" fill="#B4491F" font-family="Arial, sans-serif" font-size="20" font-weight="700">Application Layer</text>
  <text x="138" y="268" fill="#2D241B" font-family="Arial, sans-serif" font-size="18">Chat app / RAG / Agent runtime / Internal AI product</text>

  <rect x="106" y="330" width="988" height="132" rx="18" fill="#F7EFE2" stroke="#D8CAB3" stroke-width="2"/>
  <text x="138" y="370" fill="#B4491F" font-family="Arial, sans-serif" font-size="20" font-weight="700">Platform / Control Plane</text>
  <text x="138" y="404" fill="#2D241B" font-family="Arial, sans-serif" font-size="18">Routing · Autoscaling · Quota · Auth · Observability · Release · Multi-tenant isolation</text>
  <text x="138" y="434" fill="#6B5B4B" font-family="Arial, sans-serif" font-size="17">这些能力通常不由推理引擎本身完全承担。</text>

  <rect x="196" y="510" width="808" height="108" rx="20" fill="#2D241B"/>
  <text x="230" y="554" fill="#FFFaf2" font-family="Arial, sans-serif" font-size="22" font-weight="700">vLLM Execution Layer</text>
  <text x="230" y="590" fill="#F3E8DA" font-family="Arial, sans-serif" font-size="18">PagedAttention · Continuous batching · Prefix caching · OpenAI-compatible server · Distributed inference</text>

  <path d="M600 288V328" stroke="#B4491F" stroke-width="4" stroke-linecap="round"/>
  <path d="M600 462V508" stroke="#B4491F" stroke-width="4" stroke-linecap="round"/>

  <text x="78" y="674" fill="#6B5B4B" font-family="Arial, sans-serif" font-size="18">示意图：vLLM 能把模型执行和服务暴露做强，但完整平台仍需要额外的 control plane 能力。</text>
</svg>
